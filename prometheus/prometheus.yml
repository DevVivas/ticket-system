# ─────────────────────────────────────────────────────────────────────────
# Configuración de Prometheus — recolecta métricas de todos los
# microservicios del Ticket System vía sus endpoints Actuator
# (/actuator/prometheus), expuestos por Spring Boot + Micrometer.
# ─────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s # frecuencia con la que se recolectan métricas
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se monitorea a sí mismo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ms-auth"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-auth:8091"]
        labels:
          application: "ms-auth"

  - job_name: "ms-eventos"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-eventos:8081"]
        labels:
          application: "ms-eventos"

  - job_name: "ms-recintos"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-recintos:8082"]
        labels:
          application: "ms-recintos"

  - job_name: "ms-tickets"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-tickets:8083"]
        labels:
          application: "ms-tickets"

  - job_name: "ms-ventas"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-ventas:8084"]
        labels:
          application: "ms-ventas"

  - job_name: "ms-validacion"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-validacion:8085"]
        labels:
          application: "ms-validacion"

  # ms-artistas: microservicio con observabilidad completa
  # (dashboard de Grafana + logs estructurados en Loki)
  - job_name: "ms-artistas"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-artistas:8086"]
        labels:
          application: "ms-artistas"

  - job_name: "ms-preventa"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-preventa:8087"]
        labels:
          application: "ms-preventa"

  - job_name: "ms-devoluciones"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-devoluciones:8088"]
        labels:
          application: "ms-devoluciones"

  - job_name: "ms-promotores"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-promotores:8089"]
        labels:
          application: "ms-promotores"

  - job_name: "ms-streaming"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-streaming:8090"]
        labels:
          application: "ms-streaming"

  - job_name: "ms-api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-api-gateway:8080"]
        labels:
          application: "ms-api-gateway"