server.port=8083
spring.application.name=ms-tickets

spring.datasource.url=jdbc:mysql://localhost:3306/db_tickets?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
