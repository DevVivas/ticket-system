server:
  port: 8080

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: ms-eventos
            uri: http://localhost:8081
            predicates:
              - Path=/api/eventos, /api/eventos/**

          - id: ms-recintos
            uri: http://localhost:8082
            predicates:
              - Path=/api/recintos, /api/recintos/**

          - id: ms-tickets
            uri: http://localhost:8083
            predicates:
              - Path=/api/tickets, /api/tickets/**

          - id: ms-ventas
            uri: http://localhost:8084
            predicates:
              - Path=/api/ventas, /api/ventas/**

          - id: ms-validacion
            uri: http://localhost:8085
            predicates:
              - Path=/api/validacion, /api/validacion/**

          - id: ms-artistas
            uri: http://localhost:8086
            predicates:
              - Path=/api/artistas, /api/artistas/**

          - id: ms-preventa
            uri: http://localhost:8087
            predicates:
              - Path=/api/preventa, /api/preventa/**

          - id: ms-devoluciones
            uri: http://localhost:8088
            predicates:
              - Path=/api/devoluciones, /api/devoluciones/**

          - id: ms-promotores
            uri: http://localhost:8089
            predicates:
              - Path=/api/promotores, /api/promotores/**

          - id: ms-streaming
            uri: http://localhost:8090
            predicates:
              - Path=/api/streamings, /api/streamings/**
