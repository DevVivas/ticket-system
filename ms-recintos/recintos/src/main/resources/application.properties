server.port=8082
spring.application.name=ms-recintos

spring.datasource.url=jdbc:mysql://localhost:3306/db_recintos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
